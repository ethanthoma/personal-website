name: Deploy to VPS
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy
    permissions:
      deployments: write
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: '${{ github.token }}'
          environment-url: ${{ vars.MY_APP }}
          environment: production
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            cd ~/personal-website/

            git fetch origin main
            git reset --hard origin/main

            nix build .#default

            sudo systemctl restart personal-website

            sleep 2
            if ! systemctl is-active --quiet personal-website; then
              echo "Service failed to start"
              systemctl status personal-website
              exit 1
            fi

            echo "Deployment successful"
      - name: Update Status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: ${{ vars.MY_APP }}
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
      - name: Update status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: ${{ vars.MY_APP }}
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
  perf:
    name: Lighthouse (live prod)
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Resolve audit URLs
        id: urls
        run: |
          slug=$(curl -s https://www.ethanthoma.com/rss.xml \
            | grep -oP '<link>https://www\.ethanthoma\.com/post/\K[^<]+' | head -1 || true)
          {
            echo "list<<EOF"
            echo "https://www.ethanthoma.com/home"
            echo "https://www.ethanthoma.com/resources"
            [ -n "$slug" ] && echo "https://www.ethanthoma.com/post/$slug"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.urls.outputs.list }}
          configPath: ./lighthouserc.json
          temporaryPublicStorage: true
