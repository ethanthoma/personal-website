<!DOCTYPE html>
<html>
        <head>
                <title>My Website</title>

		<!-- htmx --->
                <script src="../vendor/htmx.min.js"></script>
		<script src="https://unpkg.com/hyperscript.org@0.9.9"></script>

		<link rel="stylesheet" href="../styles/main.css">
        </head>
        <body>
		<div id="tabs" hx-target="#tab-contents" _="on htmx:afterOnLoad take .selected for event.target">
			<a hx-get="pages/blog.html" class="tab selected">Blog</a>
			<a hx-get="pages/resume.html" class="tab">Resume</a>
			<a hx-get="pages/portfolio.html" class="tab">Portfolio</a>
		</div>

		<div id="tab-contents" hx-get="pages/blog.html" hx-trigger="load"></div>
        </body>
</html>
